<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comic Merge Tool</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Comic Merge Tool</h1>
<p class="sub">Remove repeated comic parts easily</p>

<label class="upload">
<input type="file" id="files" multiple accept="image/*">
<span>Select Images</span>
</label>

<div id="cards"></div>

<button id="mergeBtn">Merge Comic</button>

<canvas id="canvas"></canvas>

<a id="download" download="comic.webp">Download Result</a>

</div>

<script src="app.js"></script>
</body>
</html>
