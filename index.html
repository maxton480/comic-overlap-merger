<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Comic Merge Pro</title>

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system;
  background:linear-gradient(180deg,#0b0f1a,#111827);
  color:white;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:95%;
  max-width:480px;
  background:#151a2b;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

h1{
  font-size:22px;
  text-align:center;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  opacity:.7;
  font-size:14px;
  margin-bottom:18px;
}

.upload{
  border:2px dashed #2f3b63;
  padding:25px;
  border-radius:12px;
  text-align:center;
  margin-bottom:15px;
}

input[type=file]{
  width:100%;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
  font-size:16px;
  font-weight:bold;
}

button:active{
  transform:scale(.97);
}

.progress{
  margin-top:15px;
  height:8px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  transition:.2s;
}

#download{
  display:block;
  text-align:center;
  margin-top:18px;
  font-size:17px;
  color:#4ade80;
  text-decoration:none;
}

canvas{display:none;}

</style>
</head>

<body>

<div class="container">

<h1>📖 Comic Merge Pro</h1>
<p class="sub">Auto removes repeated panels</p>

<div class="upload">
<input type="file" id="images" multiple accept="image/*">
</div>

<button onclick="merge()">Merge Comic</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<a id="download"></a>

<canvas id="canvas"></canvas>

</div>

<script>

const OVERLAP = 252; // calibrated overlap

function loadImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.src=URL.createObjectURL(file);
  });
}

async function merge(){

  const files=document.getElementById("images").files;
  const bar=document.getElementById("bar");

  if(!files.length){
    alert("Select images first");
    return;
  }

  bar.style.width="0%";

  const images=[];

  // Load images
  for(let i=0;i<files.length;i++){
    images.push(await loadImage(files[i]));
    bar.style.width=((i+1)/files.length*30)+"%";
  }

  const width=images[0].width;

  let totalHeight=images[0].height;

  for(let i=1;i<images.length;i++){
    totalHeight+=images[i].height-OVERLAP;
  }

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=width;
  canvas.height=totalHeight;

  let y=0;

  // First image full
  ctx.drawImage(images[0],0,y);
  y+=images[0].height;

  // Next images cropped
  for(let i=1;i<images.length;i++){

    ctx.drawImage(
      images[i],
      0,OVERLAP,
      width,images[i].height-OVERLAP,
      0,y,
      width,images[i].height-OVERLAP
    );

    y+=images[i].height-OVERLAP;

    bar.style.width=(30+(i/images.length)*70)+"%";
  }

  const link=document.getElementById("download");

  link.href=canvas.toDataURL("image/png");
  link.download="merged_comic.png";
  link.innerText="⬇ Download Merged Comic";

  bar.style.width="100%";
}

</script>

</body>
</html>
