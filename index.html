<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comic Merger Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<h1>📖 Comic Merger Pro</h1>
<p class="tag">Remove repeated comic parts easily</p>

<label class="upload">
<input type="file" id="images" multiple accept="image/*">
<span>Upload Comic Images</span>
</label>

<div id="imageList"></div>

<button class="mergeBtn" onclick="merge()">Merge Comic</button>

<canvas id="canvas"></canvas>

<a id="download" download="comic.webp">Download Comic</a>

</div>

<script src="script.js"></script>
</body>
</html>
