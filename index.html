<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Comic Batch Merge Pro</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1020;
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:95%;
  max-width:480px;
  padding:20px;
}

h1{text-align:center;margin-bottom:8px}
.sub{text-align:center;opacity:.7;margin-bottom:15px}

input,button{
  width:100%;
  margin-top:10px;
}

button{
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
  font-size:16px;
}

.progress{
  margin-top:15px;
  height:8px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#4ade80;
}
canvas{display:none}
</style>
</head>

<body>

<div class="container">

<h1>📖 Comic Batch Merge</h1>
<p class="sub">Auto merge • Watermark • WebP export</p>

<input type="file" id="images" multiple accept="image/*">

<label>Watermark Image (PNG)</label>
<input type="file" id="watermark" accept="image/png">

<button onclick="start()">Merge & Download</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<canvas id="canvas"></canvas>

</div>

<script>

const OVERLAP = 250;
const BATCH_SIZE = 10;
const WATERMARK_OPACITY = 0.4;

function loadImage(file){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.src=URL.createObjectURL(file);
  });
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function start(){

const files=[...document.getElementById("images").files];
const wmFile=document.getElementById("watermark").files[0];
const bar=document.getElementById("bar");

if(!files.length) return alert("Select images");

const watermark = wmFile ? await loadImage(wmFile) : null;

let batchCount=Math.ceil(files.length/BATCH_SIZE);

for(let b=0;b<batchCount;b++){

  const batchFiles=files.slice(
    b*BATCH_SIZE,
    (b+1)*BATCH_SIZE
  );

  const images=[];

  for(let f of batchFiles){
    images.push(await loadImage(f));
  }

  const width=images[0].width;

  let totalHeight=images[0].height;

  for(let i=1;i<images.length;i++)
    totalHeight+=images[i].height-OVERLAP;

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=width;
  canvas.height=totalHeight;

  let y=0;

  ctx.drawImage(images[0],0,y);
  y+=images[0].height;

  for(let i=1;i<images.length;i++){
    ctx.drawImage(
      images[i],
      0,OVERLAP,
      width,images[i].height-OVERLAP,
      0,y,
      width,images[i].height-OVERLAP
    );
    y+=images[i].height-OVERLAP;
  }

  // WATERMARK
  if(watermark){
    ctx.globalAlpha=WATERMARK_OPACITY;

    const wmWidth=width*0.6;
    const wmHeight=watermark.height*(wmWidth/watermark.width);

    ctx.drawImage(
      watermark,
      (width-wmWidth)/2,
      canvas.height-wmHeight-40,
      wmWidth,
      wmHeight
    );

    ctx.globalAlpha=1;
  }

  // EXPORT WEBP
  const url=canvas.toDataURL("image/webp",0.95);

  const a=document.createElement("a");

  const number=String(b+1).padStart(3,"0");

  a.href=url;
  a.download=`${number}.webp`;
  a.click();

  bar.style.width=((b+1)/batchCount*100)+"%";

  await sleep(500); // mobile safety delay
}

alert("✅ All batches downloaded!");

}

</script>

</body>
</html>
