<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comic Merger Pro</title>

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

.wrap{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:14px;
margin-top:15px;
}

canvas{
width:100%;
border-radius:10px;
margin-top:10px;
touch-action:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div class="wrap">

<h2>📚 Comic Merger</h2>

<div class="card">

<input type="file" id="files" multiple accept="image/*">

<p>✂️ Crop First Image</p>
<canvas id="canvas1"></canvas>

<p>✂️ Crop Last Image</p>
<canvas id="canvas2"></canvas>

<button onclick="start()">🚀 Merge</button>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

let files=[];
let crop1={y1:0,y2:0};
let crop2={y1:0,y2:0};

const canvas1=document.getElementById("canvas1");
const canvas2=document.getElementById("canvas2");

let ctx1=canvas1.getContext("2d");
let ctx2=canvas2.getContext("2d");

document.getElementById("files").onchange=async e=>{
files=[...e.target.files];

if(files.length<1)return;

// load first
let img1=await loadImage(files[0]);
drawImage(canvas1,ctx1,img1);

// load last
let img2=await loadImage(files[files.length-1]);
drawImage(canvas2,ctx2,img2);

setupCrop(canvas1,crop1);
setupCrop(canvas2,crop2);
};

function loadImage(file){
return new Promise(r=>{
const img=new Image();
img.onload=()=>r(img);
img.src=URL.createObjectURL(file);
});
}

function drawImage(canvas,ctx,img){
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
}

function setupCrop(canvas,crop){

let dragging=false;

canvas.addEventListener("touchstart",e=>{
dragging=true;
crop.y1=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
if(!dragging)return;

crop.y2=e.touches[0].clientY;
drawCrop(canvas,crop);
});

canvas.addEventListener("touchend",()=>{
dragging=false;
});

}

function drawCrop(canvas,crop){

const ctx=canvas.getContext("2d");

ctx.fillStyle="rgba(0,0,0,0.5)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.clearRect(0,Math.min(crop.y1,crop.y2),canvas.width,Math.abs(crop.y2-crop.y1));

}

async function mergeBatch(images, startIndex){

const width=images[0].width;

let totalHeight=0;

images.forEach((img,i)=>{
let h=img.height;

if(startIndex+i===0){
h = Math.abs(crop1.y2 - crop1.y1);
}
if(startIndex+i===files.length-1){
h = Math.abs(crop2.y2 - crop2.y1);
}

if(startIndex+i===0)
totalHeight+=h;
else
totalHeight+=h-200;
});

const canvas=document.createElement("canvas");
canvas.width=width;
canvas.height=totalHeight;
const ctx=canvas.getContext("2d");

let y=0;

images.forEach((img,i)=>{

let sy=0;
let sh=img.height;

if(startIndex+i===0){
sy = Math.min(crop1.y1,crop1.y2);
sh = Math.abs(crop1.y2-crop1.y1);
}

if(startIndex+i===files.length-1){
sy = Math.min(crop2.y1,crop2.y2);
sh = Math.abs(crop2.y2-crop2.y1);
}

ctx.drawImage(img,0,sy,width,sh,0,y,width,sh);
y+=sh-200;

});

return new Promise(r=>canvas.toBlob(r,"image/webp",0.95));
}

async function start(){

const zip=new JSZip();

let index=1;

for(let i=0;i<files.length;i+=10){

const batch=files.slice(i,i+10);

const imgs=[];
for(const f of batch){
imgs.push(await loadImage(f));
}

const blob=await mergeBatch(imgs,i);

zip.file(index+".webp",blob);
index++;
}

const content=await zip.generateAsync({type:"blob"});

const a=document.createElement("a");
a.href=URL.createObjectURL(content);
a.download="comic.zip";
a.click();
}

</script>

</body>
</html>
