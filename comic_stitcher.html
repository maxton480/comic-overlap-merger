<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>1080 Comic Merger</title>

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

.wrap{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:14px;
margin-top:15px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}
</style>
</head>

<body>

<div class="wrap">
<h2>📚 1080 Comic Merger</h2>

<div class="card">

<input type="file" id="files" multiple accept="image/*">
<input id="zipName" placeholder="ZIP Name">

<button onclick="start()">Merge & Download</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="status">Waiting...</p>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

const OVERLAP = 300;
const BATCH = 10;
const WATERMARK = "watermark.png";

const bar=document.getElementById("bar");
const status=document.getElementById("status");

function loadImage(file){
return new Promise(r=>{
const img=new Image();
img.onload=()=>r(img);
img.src=URL.createObjectURL(file);
});
}

function loadWatermark(){
return new Promise(r=>{
const img=new Image();
img.onload=()=>r(img);
img.src=WATERMARK;
});
}

async function mergeBatch(images, watermark, globalStart){

const width=images[0].width;

let totalHeight=0;

images.forEach((img,i)=>{
if(globalStart+i===0)
totalHeight+=img.height;
else
totalHeight+=img.height-OVERLAP;
});

const canvas=document.createElement("canvas");
canvas.width=width;
canvas.height=totalHeight;

const ctx=canvas.getContext("2d");

let y=0;

images.forEach((img,i)=>{

const index=globalStart+i;

if(index===0){
ctx.drawImage(img,0,y);
y+=img.height;
}else{
ctx.drawImage(
img,
0,OVERLAP,
width,img.height-OVERLAP,
0,y,
width,img.height-OVERLAP
);
y+=img.height-OVERLAP;
}

});

ctx.globalAlpha=0.4;

const wmWidth=width*0.25;
const wmHeight=watermark.height*(wmWidth/watermark.width);

ctx.drawImage(
watermark,
width-wmWidth-20,
canvas.height-wmHeight-20,
wmWidth,
wmHeight
);

ctx.globalAlpha=1;

return new Promise(res=>{
canvas.toBlob(res,"image/webp",0.95);
});
}

async function start(){

const files=[...document.getElementById("files").files];
if(!files.length)return alert("Select images");

status.innerText="Loading watermark...";
const watermark=await loadWatermark();

const zip=new JSZip();
const zipName=document.getElementById("zipName").value||"comic";

let outputIndex=1;

for(let i=0;i<files.length;i+=BATCH){

status.innerText=`Processing ${i+1}-${Math.min(i+BATCH,files.length)}`;

const batchFiles=files.slice(i,i+BATCH);

const imgs=[];
for(const f of batchFiles){
imgs.push(await loadImage(f));
}

const blob=await mergeBatch(imgs,watermark,i);

const name=String(outputIndex).padStart(3,"0")+".webp";
zip.file(name,blob);

outputIndex++;

bar.style.width=Math.floor((i/files.length)*100)+"%";

await new Promise(r=>setTimeout(r,50));
}

status.innerText="Creating ZIP...";

const content=await zip.generateAsync({type:"blob"});

const a=document.createElement("a");
a.href=URL.createObjectURL(content);
a.download=zipName+".zip";
a.click();

bar.style.width="100%";
status.innerText="✅ Done!";
}

</script>

</body>
</html>
