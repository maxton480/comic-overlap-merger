<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comic Merger Ultimate</title>

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

.wrap{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:14px;
margin-top:15px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

.progress{
height:10px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}
</style>
</head>

<body>

<div class="wrap">
<h2>📚 Comic Merger Ultimate</h2>

<div class="card">

<!-- 🔥 10 Folder Selectors -->
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>
<input type="file" class="folder" webkitdirectory directory>

<input id="zipName" placeholder="ZIP Name (e.g. ipjn)">
<input id="startNum" type="number" placeholder="Start Number (e.g. 1)" value="1">

<button onclick="start()">🚀 Merge Comic</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="status">Waiting...</p>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

const OVERLAP = 250;
const BATCH = 10;
const WATERMARK = "watermark.png";

const bar=document.getElementById("bar");
const status=document.getElementById("status");

function loadImage(file){
return new Promise(r=>{
const img=new Image();
img.onload=()=>r(img);
img.src=URL.createObjectURL(file);
});
}

function loadWatermark(){
return new Promise(r=>{
const img=new Image();
img.onload=()=>r(img);
img.src=WATERMARK;
});
}

async function mergeBatch(images, watermark, globalStartIndex){

const width=images[0].width;

let totalHeight=0;

images.forEach((img,i)=>{
if(globalStartIndex+i===0)
totalHeight+=img.height;
else
totalHeight+=img.height-OVERLAP;
});

const canvas=document.createElement("canvas");
canvas.width=width;
canvas.height=totalHeight;

const ctx=canvas.getContext("2d");

let y=0;

images.forEach((img,i)=>{

const globalIndex = globalStartIndex + i;

if(globalIndex===0){
ctx.drawImage(img,0,y);
y+=img.height;
}else{
ctx.drawImage(
img,
0,OVERLAP,
width,img.height-OVERLAP,
0,y,
width,img.height-OVERLAP
);
y+=img.height-OVERLAP;
}

});

/* watermark */
if(watermark){
ctx.globalAlpha=0.4;

const wmW=width*0.25;
const ratio=watermark.height/watermark.width;
const wmH=wmW*ratio;

ctx.drawImage(
watermark,
width-wmW-20,
totalHeight-wmH-20,
wmW,
wmH
);

ctx.globalAlpha=1;
}

return new Promise(res=>{
canvas.toBlob(res,"image/webp",0.95);
});
}

async function start(){

const inputs = document.querySelectorAll(".folder");
const zipBaseName = document.getElementById("zipName").value || "comic";

// 🔥 custom start number
let folderIndex = parseInt(document.getElementById("startNum").value) || 1;

status.innerText="Loading watermark...";
let watermark=null;

try{
 watermark=await loadWatermark();
}catch{}

for(const input of inputs){

 const files = [...input.files];
 if(!files.length) continue;

 // sort
 files.sort((a,b)=>a.webkitRelativePath.localeCompare(b.webkitRelativePath));

 const zip = new JSZip();

 let outputIndex = 1;

 for(let i=0;i<files.length;i+=BATCH){

  status.innerText=`Folder ${folderIndex} : ${i+1}-${Math.min(i+BATCH,files.length)}`;

  const batchFiles=files.slice(i,i+BATCH);

  const imgs=[];
  for(const f of batchFiles){
   imgs.push(await loadImage(f));
  }

  const blob=await mergeBatch(imgs,watermark,i);

  const name=String(outputIndex).padStart(3,"0")+".webp";
  zip.file(name,blob);

  outputIndex++;

  bar.style.width=Math.floor(((i+BATCH)/files.length)*100)+"%";

  await new Promise(r=>setTimeout(r,50));
 }

 status.innerText=`Creating ZIP ${folderIndex}...`;

 const content=await zip.generateAsync({type:"blob"});

 const a=document.createElement("a");
 a.href=URL.createObjectURL(content);
 a.download=zipBaseName + folderIndex + ".zip";
 a.click();

 folderIndex++; // 🔥 next number auto
}

bar.style.width="100%";
status.innerText="✅ All Done!";
}

</script>

</body>
</html>
